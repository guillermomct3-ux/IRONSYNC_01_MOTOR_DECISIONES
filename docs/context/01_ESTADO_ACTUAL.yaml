database:
  supabase:
    proyecto: "yfspmcffwwruitxzrzaw"

    schema_cambios:
      - tabla: "operadores"
        columna: "empresa_id"
        tipo: "UUID"
        nullable: true
        fecha_agregada: "2026-05-06"
        migration: "migrations/001_add_operadores_empresa_id.sql"
        proposito: "Validacion strict logbookService.js"

      - tabla: "turnos"
        columna: "cerrado_por"
        tipo: "text"
        nullable: true
        valores_esperados:
          - "operador"
          - "operador_siguiente"
          - "supervisor"
          - "sistema"
        fecha_agregada: "2026-05-06"
        migration: "migrations/002_add_turnos_cerrado_por.sql"
        proposito: "Trazabilidad cierre turnos"

    datos_prueba:
      turnos_totales: 22
      turnos_cerrados: 18
      turnos_abiertos_anomalia: 4
