      lineage:
        t01_t10_lote1: "10 turnos (7 cerrados, 1 parcial, 2 skip)"
        t06_r1_r7_fix: "7 turnos (cerrados durante pruebas FIX-T06)"
        t11_t15_lote2: "5 turnos (2 cerrados por FIN real, 3 remanentes)"

      remanentes_controlados:
        cantidad: 4
        estado: "ABIERTO"
        tiene_anomalia: true
        accion: "EXCLUIR"
        excluidos_de:
          - "laboratorio_sintetico"
          - "produccion"
          - "metricas"
          - "conteo_turnos_reales"
        folios:
          - "CAT140H-20260506-9205"
          - "CAT320-20260506-9804"
          - "CAT740-20260506-5617"
          - "CATD8T-20260506-1435"

      query_exclusion:
        descripcion: "Query para Laboratorio S01-S20 excluye turnos anomalia"
        sql: |
          SELECT * FROM turnos
          WHERE tiene_anomalia = false
            AND created_at >= '2026-05-06'

