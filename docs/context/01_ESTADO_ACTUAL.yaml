## Orden de migraciones F-04.1

Las migraciones versionan SQL ya ejecutado manualmente durante F-04.1.

Orden:
1. 001_add_operadores_empresa_id.sql
2. 002_add_turnos_cerrado_por.sql

Estas migraciones son idempotentes y deben revisarse antes de cualquier ejecucion.

No ejecutar migraciones en produccion sin War Room.

## Archivos

### 001_add_operadores_empresa_id.sql
- Tabla: operadores
- Columna: empresa_id
- Tipo: UUID
- Nullable: true
- Proposito: Validacion strict logbookService.js
- Estado: EJECUTADA

### 002_add_turnos_cerrado_por.sql
- Tabla: turnos
- Columna: cerrado_por
- Tipo: text
- Nullable: true
- Valores esperados: operador, operador_siguiente, supervisor, sistema
- Proposito: Trazabilidad cierre turnos
- Estado: EJECUTADA

## Restricciones

- NO ejecutar sin War Room
- NO ejecutar en produccion sin aprobacion explicita
- Las migraciones son idempotentes (pueden re-ejecutarse sin efecto secundario)
- Revisar contenido antes de ejecutar

## Rollback

Si se requiere rollback de migrations:

`sql
-- Rollback 002
ALTER TABLE turnos DROP COLUMN IF EXISTS cerrado_por;

-- Rollback 001
ALTER TABLE operadores DROP COLUMN IF EXISTS empresa_id;
@"
